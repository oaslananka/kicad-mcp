name: GUI CI

on:
  push:
    branches: [main, "feat/gui-*"]
    paths:
      - "src/kicad_mcp/web/**"
      - "src/kicad_mcp/tray.py"
      - "src-tauri/**"
      - "tests/unit/test_web_routes*.py"
      - "tests/unit/test_tray.py"
      - "tests/unit/test_cli_init.py"
      - "tests/e2e/test_web_dashboard.py"
      - ".github/workflows/gui-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "src/kicad_mcp/web/**"
      - "src/kicad_mcp/tray.py"
      - "src-tauri/**"
      - "tests/unit/test_web_routes*.py"
      - "tests/unit/test_tray.py"
      - "tests/unit/test_cli_init.py"
      - "tests/e2e/test_web_dashboard.py"
      - ".github/workflows/gui-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: uv.toml
      - name: Install Python dependencies
        run: uv sync --all-extras --frozen
      - name: Run dashboard and tray unit tests
        run: uv run pytest tests/unit/test_web_routes.py tests/unit/test_web_routes_step3.py tests/unit/test_tray.py tests/unit/test_cli_init.py -v
      - name: Lint dashboard and tray modules
        run: uv run ruff check src/kicad_mcp/web src/kicad_mcp/tray.py src/kicad_mcp/cli_init.py

  playwright:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: uv.toml
      - name: Install test dependencies
        run: uv sync --group dev --frozen
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
      - name: Run dashboard E2E tests
        run: E2E=1 uv run pytest tests/e2e/test_web_dashboard.py -v

  tauri-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Cargo check Tauri bridge
        working-directory: src-tauri
        run: cargo check --locked
