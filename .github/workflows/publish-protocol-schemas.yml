name: Publish Protocol Schemas

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    defaults:
      run:
        working-directory: packages/protocol-schemas
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm run build
      - name: Pack and generate evidence
        id: pack-evidence
        shell: bash
        run: |
          set -euo pipefail
          corepack pnpm pack --pack-destination ../../release-assets/protocol-schemas
          evidence_dir="../../release-assets/protocol-schemas"
          mkdir -p "$evidence_dir"
          (cd "$evidence_dir" && sha256sum -- *.tgz > SHA256SUMS.txt)
          corepack pnpm sbom --sbom-format cyclonedx --sbom-type application > "$evidence_dir/sbom.cdx.json"
          (cd "$evidence_dir" && sha256sum --check SHA256SUMS.txt)
          echo "tarball=../../release-assets/protocol-schemas/$(ls "$evidence_dir"/*.tgz | xargs -n1 basename)" >> "$GITHUB_OUTPUT"
      - name: Attest tarball
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: release-assets/protocol-schemas/SHA256SUMS.txt
          sbom-path: release-assets/protocol-schemas/sbom.cdx.json
      - name: Store release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: protocol-schemas-release-evidence
          path: release-assets/protocol-schemas
          if-no-files-found: error
          retention-days: 14
      - name: Attach evidence to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          upload_dir="../../release-assets/upload/protocol-schemas"
          mkdir -p "$upload_dir"
          cp ../../release-assets/protocol-schemas/*.tgz "$upload_dir/"
          cp ../../release-assets/protocol-schemas/SHA256SUMS.txt "$upload_dir/protocol-schemas-SHA256SUMS.txt"
          cp ../../release-assets/protocol-schemas/sbom.cdx.json "$upload_dir/protocol-schemas-sbom.cdx.json"
          gh release upload "$RELEASE_TAG" "$upload_dir"/* --clobber
      - name: Verify checksums before publish
        run: (cd ../../release-assets/protocol-schemas && sha256sum --check SHA256SUMS.txt)
      - run: npm publish "${{ steps.pack-evidence.outputs.tarball }}" --access public --provenance --ignore-scripts
      - name: Verify published tarball
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          node ../../scripts/verify-npm-release.mjs \
            --package @oaslananka/kicad-protocol-schemas \
            --version "$version" \
            --checksums ../../release-assets/protocol-schemas/SHA256SUMS.txt \
            --output-dir ../../release-assets/protocol-schemas-verify
