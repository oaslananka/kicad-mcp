name: GUI Release

on:
  push:
    tags:
      - "kicad-mcp-gui-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. kicad-mcp-gui-v3.9.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: gui-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  tauri-build:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: linux-tauri
            args: ""
          - os: windows-2025-vs2026
            artifact-name: windows-tauri
            args: ""
          - os: macos-15
            artifact-name: macos-tauri
            args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
          version-file: uv.toml

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python package dependencies
        run: uv sync --all-extras --frozen

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri installer
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing secrets are not configured → skip codesigning on macOS
          TAURI_SKIP_CODESIGNING: ${{ runner.os == 'macOS' && '1' || '' }}
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/wix/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  create-release:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    needs: tauri-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Download all Tauri bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.run_id }} --repo ${{ github.repository }} --dir artifacts

      - name: Upload installers to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          TAG="$RELEASE_TAG"
          REPO="${{ github.repository }}"

          case "$TAG" in
            kicad-mcp-gui-v*) ;;
            *)
              echo "::error::Release tag must start with kicad-mcp-gui-v, got: $TAG"
              exit 1
              ;;
          esac

          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG does not exist yet, creating..."
            gh release create "$TAG" --repo "$REPO" \
              --title "$TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi

          mkdir -p release-assets

          mapfile -d '' installers < <(
            find artifacts -type f \( \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.AppImage' -o \
              -name '*.dmg' -o \
              -name '*.msi' -o \
              -name '*.exe' \
            \) -print0
          )

          if [ "${#installers[@]}" -eq 0 ]; then
            echo "::error::No installer files found. Refusing to upload internal bundle files."
            find artifacts -maxdepth 5 -type f | sort
            exit 1
          fi

          for f in "${installers[@]}"; do
            case "$f" in
              *linux-tauri*|*linux*) os="linux" ;;
              *windows-tauri*|*windows*) os="windows" ;;
              *macos-tauri*|*macos*|*darwin*) os="macos" ;;
              *) os="other" ;;
            esac

            base="$(basename "$f" | tr ' ' '-')"
            target="release-assets/${os}_${base}"
            cp "$f" "$target"
            echo "Prepared ($os): $target"
          done

          ls -lh release-assets
          gh release upload "$TAG" release-assets/* --repo "$REPO" --clobber

          echo "::notice::Installers uploaded to $REPO/releases/tag/$TAG"
