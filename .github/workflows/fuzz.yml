name: Fuzz

on:
  pull_request:
    paths:
      - "fuzz/**"
      - "src/kicad_mcp/utils/sexpr.py"
      - ".github/workflows/fuzz.yml"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - "fuzz/**"
      - "src/kicad_mcp/utils/sexpr.py"
      - ".github/workflows/fuzz.yml"
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  atheris-sexpr:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: uv.toml
      - name: Run S-expression fuzz smoke target
        run: >-
          uv run --all-extras --with atheris==3.1.0
          python fuzz/fuzz_sexpr.py -runs=512 -max_len=4096
