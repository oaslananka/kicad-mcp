name: Publish Python

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        options: [testpypi, pypi]
        default: testpypi
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    if: >-
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'release' &&
        startsWith(github.event.release.tag_name, 'mcp-server-v')))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
          version-file: uv.toml
      - run: uv sync --all-extras --frozen
      - run: uv build
      - run: uv run --all-extras python scripts/check_package_metadata.py
      - name: Generate Python release evidence
        shell: bash
        run: |
          set -euo pipefail
          uv run --all-extras python scripts/generate_release_evidence.py generate \
            --dist-dir dist \
            --output release-evidence
          uv run --all-extras python scripts/generate_release_evidence.py verify-local \
            --checksums release-evidence/SHA256SUMS.txt \
            --artifacts dist
          (cd dist && sha256sum --check ../release-evidence/SHA256SUMS.txt)
      - name: Attest Python distributions
        id: attest-python
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: release-evidence/SHA256SUMS.txt
          sbom-path: release-evidence/sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-release-evidence
          path: release-evidence
      - name: Attach Python evidence to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          upload_dir="release-assets/upload/kicad-mcp-pro-python"
          mkdir -p "$upload_dir"
          cp dist/*.whl "$upload_dir/"
          cp dist/*.tar.gz "$upload_dir/"
          cp release-evidence/SHA256SUMS.txt "$upload_dir/kicad-mcp-pro-python-SHA256SUMS.txt"
          cp release-evidence/sbom.cdx.json "$upload_dir/kicad-mcp-pro-python-sbom.cdx.json"
          cp release-evidence/release-evidence.json "$upload_dir/kicad-mcp-pro-python-release-evidence.json"
          gh release upload "$RELEASE_TAG" \
            "$upload_dir"/* \
            --clobber

  publish-testpypi:
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/kicad-mcp-pro
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
          version-file: uv.toml
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-release-evidence
          path: release-evidence
      - name: Verify Python checksums before TestPyPI publish
        run: |
          uv run --frozen python scripts/generate_release_evidence.py verify-local --checksums release-evidence/SHA256SUMS.txt --artifacts dist
          (cd dist && sha256sum --check ../release-evidence/SHA256SUMS.txt)
      - name: Check if version already published
        id: check-published
        shell: bash
        run: |
          set -euo pipefail
          version="$(uv run --frozen python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          if curl -fsS "https://test.pypi.org/pypi/kicad-mcp-pro/${version}/json" >/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        if: steps.check-published.outputs.already_published != 'true'
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
          attestations: true
      - name: Verify TestPyPI published digests
        run: |
          version="$(uv run --frozen python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          uv run --frozen python scripts/generate_release_evidence.py verify-pypi \
            --repository testpypi \
            --package kicad-mcp-pro \
            --version "$version" \
            --checksums release-evidence/SHA256SUMS.txt

  publish-pypi:
    if: >-
      (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') &&
      ((github.event_name == 'release' && startsWith(github.event.release.tag_name, 'mcp-server-v')) ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'))
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/kicad-mcp-pro
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: false
          version-file: uv.toml
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-release-evidence
          path: release-evidence
      - name: Verify Python checksums before PyPI publish
        run: |
          uv run --frozen python scripts/generate_release_evidence.py verify-local --checksums release-evidence/SHA256SUMS.txt --artifacts dist
          (cd dist && sha256sum --check ../release-evidence/SHA256SUMS.txt)
      - name: Check if version already published
        id: check-published
        shell: bash
        run: |
          set -euo pipefail
          version="$(uv run --frozen python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          if curl -fsS "https://pypi.org/pypi/kicad-mcp-pro/${version}/json" >/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        if: steps.check-published.outputs.already_published != 'true'
        with:
          packages-dir: dist
          attestations: true
      - name: Verify PyPI published digests
        run: |
          version="$(uv run --frozen python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          uv run --frozen python scripts/generate_release_evidence.py verify-pypi \
            --repository pypi \
            --package kicad-mcp-pro \
            --version "$version" \
            --checksums release-evidence/SHA256SUMS.txt
