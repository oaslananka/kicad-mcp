# Deploy MkDocs site to GitHub Pages
# Triggered when docs/ or mkdocs.yml change on main,
# or on workflow_dispatch for manual deploys.

name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Cancel in-progress runs for the same workflow + ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for git-revision-date-localized plugin

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: uv.toml

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9fc0ae0bf97e009e7bcdb329fad2393

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db9016429d0bfd0b53eefc1363a0d9b18a56e3
