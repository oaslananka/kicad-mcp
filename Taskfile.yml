version: "3"

tasks:
  install:
    desc: Install all development dependencies
    cmds:
      - corepack pnpm install --frozen-lockfile
      - uv sync --all-extras --frozen

  hooks:
    desc: Install local git hooks
    cmds:
      - uvx pre-commit install --install-hooks
      - uvx pre-commit install --hook-type commit-msg
      - uvx pre-commit install --hook-type pre-push

  format:
    desc: Auto-format the codebase
    cmds:
      - corepack pnpm run format

  lint:
    desc: Run read-only lint and metadata checks
    cmds:
      - corepack pnpm run metadata:check
      - corepack pnpm run lint
      - corepack pnpm run format:check

  typecheck:
    desc: Run strict static type checking
    cmds:
      - corepack pnpm run typecheck

  compat:check:
    desc: Check KiCad API compatibility constraints
    cmds:
      - corepack pnpm run compat:check

  test:
    desc: Run unit tests
    cmds:
      - corepack pnpm run test:unit

  test:fast:
    desc: Run fast tests
    cmds:
      - corepack pnpm run test:unit

  test:cov:
    desc: Run the full test suite with coverage
    cmds:
      - corepack pnpm run test

  security:
    desc: Run enforced security checks
    cmds:
      - corepack pnpm run security

  security:local:
    desc: Run local workstation security scanners with clear missing-tool failures
    cmds:
      - corepack pnpm run security:local

  workflows:lint:
    desc: Parse and lint GitHub Actions workflows
    cmds:
      - corepack pnpm run workflows:lint

  workflows:security:
    desc: Run workflow security checks
    cmds:
      - corepack pnpm run workflows:security

  mcp:manifest:check:
    desc: Validate MCP Registry metadata
    cmds:
      - corepack pnpm run mcp:manifest:check

  docker:metadata:check:
    desc: Validate Docker and OCI metadata
    cmds:
      - corepack pnpm run docker:metadata:check

  build:
    desc: Build release artifacts
    cmds:
      - corepack pnpm run build

  release:dry-run:
    desc: Run the release preflight without publishing
    cmds:
      - corepack pnpm run release:dry-run

  package:check:
    desc: Build and check package artifacts
    cmds:
      - corepack pnpm run package:check

  verify:
    desc: Local quality gate — lint, format, typecheck, test, build
    cmds:
      - task: lint
      - task: typecheck
      - task: test:fast
      - task: build

  pre-push:
    desc: Run the pre-push parity gate
    cmds:
      - corepack pnpm run metadata:check
      - corepack pnpm run format:check
      - task: compat:check
      - task: lint
      - task: mcp:manifest:check
      - task: docker:metadata:check
      - task: typecheck
      - task: test:fast
      - task: workflows:lint

  ci:
    desc: Run the local equivalent of CI
    cmds:
      - task: install
      - task: compat:check
      - task: lint
      - task: mcp:manifest:check
      - task: docker:metadata:check
      - task: typecheck
      - task: test:cov
      - task: security
      - task: workflows:lint
      - task: workflows:security
      - task: package:check
      - task: release:dry-run

  ci:act:
    desc: Run the GitHub Actions CI workflow locally with act
    cmds:
      - act -W .github/workflows/ci.yml --container-architecture linux/amd64

  dev:
    desc: Start Backend + web UI dev mode
    cmds:
      - uv run kicad-mcp-pro dashboard --host 127.0.0.1 --port 3334

  dev:tray:
    desc: Start the tray app in development mode
    cmds:
      - uv run kicad-mcp-pro tray --port 3334

  inspect:
    desc: Launch the MCP Inspector GUI for interactive tool debugging
    cmds:
      - uv run kicad-mcp-pro inspect

  inspect:local:
    desc: Connect MCP Inspector to a running local Streamable HTTP server
    cmds:
      - npx @modelcontextprotocol/inspector http://localhost:3334/mcp

  dashboard:
    desc: Start the server with the web dashboard enabled
    cmds:
      - uv run kicad-mcp-pro dashboard --open

  tray:
    desc: Launch the system tray application
    cmds:
      - uv run kicad-mcp-pro tray

  dev:tauri:
    desc: Run the Tauri v2 desktop app in development mode (starts Python server automatically)
    cmds:
      - cmd: cd src-tauri && cargo run
        silent: false

  test:web:
    desc: Run web dashboard API and SSE route tests
    cmds:
      - uv run pytest tests/unit/test_web_routes.py tests/unit/test_web_routes_step3.py -v

  test:playwright:
    desc: Run Playwright-backed dashboard E2E tests
    cmds:
      - E2E=1 uv run pytest tests/e2e/test_web_dashboard.py -v
    platforms: [linux, darwin]

  test:playwright:windows:
    desc: Run Playwright-backed dashboard E2E tests on Windows
    cmds:
      - powershell -NoProfile -Command "$env:E2E='1'; uv run pytest tests/e2e/test_web_dashboard.py -v"
    platforms: [windows]

  test:e2e:full:
    desc: Run backend web tests and frontend E2E tests
    cmds:
      - task: test:web
      - task: test:playwright

  build:ui:
    desc: Validate the embedded Starlette dashboard UI
    cmds:
      - uv run pytest tests/unit/test_web_routes.py::TestWebModule::test_dashboard_html_content -q

  build:tauri:
    desc: Build the Tauri v2 desktop app for production
    cmds:
      - cmd: cd src-tauri && cargo tauri build
        silent: false

  build:tauri:universal:
    desc: Build macOS universal Tauri bundle
    cmds:
      - cmd: cd src-tauri && cargo tauri build -- --target universal-apple-darwin
        silent: false

  icons:tauri:
    desc: Regenerate Tauri placeholder icon files
    cmds:
      - uv run python scripts/generate_tauri_icons.py

  icons:generate:
    desc: Regenerate tray and Tauri icon assets
    cmds:
      - uv run python scripts/generate_icons.py --source assets/icon.svg

  clean:
    desc: Remove generated build and test artifacts
    cmds:
      - cmd: rm -rf dist build .pytest_cache .mypy_cache .ruff_cache htmlcov coverage.xml junit.xml
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "Remove-Item -Recurse -Force dist,build,.pytest_cache,.mypy_cache,.ruff_cache,htmlcov,coverage.xml,junit.xml -ErrorAction SilentlyContinue"
        platforms: [windows]
