# KiCad capability-parity matrix (work order P0-T4)
#
# This is the machine-readable source of truth for the question: "Of everything a
# KiCad expert can do *programmatically*, how much can this MCP server drive?"
#
# It is deliberately separate from compatibility.yaml (which tracks version support
# and importer/exporter feature parity). This file is organized by EE workflow
# DOMAIN and answers, per capability, which channel KiCad exposes it through and
# whether an MCP tool drives it.
#
# Regenerate the human-readable view and validate with:
#   uv run python scripts/build_parity_matrix.py            # write generated md
#   uv run python scripts/build_parity_matrix.py --check    # CI drift gate
#
# HONESTY RULES (enforced by tests/unit/test_parity_matrix.py):
#   * Every non-null `mcp_tool` must be a really-registered tool name.
#   * status: covered      -> mcp_tool is set and registered (no false positives).
#   * status: partial      -> a tool exists but with a tracked limitation (heuristic,
#                             stubbed, orphaned/hidden, or manual step required).
#   * status: gap          -> KiCad exposes this via cli/ipc/file but NO tool drives
#                             it yet. This counts against our coverage.
#   * status: gui-only-no-api -> KiCad only offers this interactively; there is no
#                             cli/ipc/file path, so no tool can reach it. This is a
#                             KiCad API limit, NOT our gap, and is excluded from the
#                             coverage denominator.
#
# Coverage % per domain (and overall) = covered / (total - gui_only_no_api).

schemaVersion: 1
updated: "2026-06-16"
kicad_baseline: "10.0.x"

status_vocabulary:
  covered: "A registered MCP tool fully drives this capability."
  partial: "Some MCP support exists but with a tracked limitation (heuristic estimate, stubbed dependency, hidden/orphaned tool, or a manual KiCad step)."
  gap: "KiCad exposes this programmatically (cli/ipc/file) but no MCP tool drives it yet."
  gui-only-no-api: "KiCad only offers this interactively; no cli/ipc/file path exists. Excluded from the coverage denominator (a KiCad API limit, not ours)."

channel_vocabulary:
  file: "Direct .kicad_sch / .kicad_pcb / .kicad_pro S-expression or JSON manipulation."
  cli: "Driven through the kicad-cli subprocess."
  ipc: "Driven through the KiCad IPC / kipy API against a running KiCad."
  gui-only: "Only reachable through interactive KiCad UI; no headless surface."

