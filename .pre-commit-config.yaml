repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        always_run: true
        pass_filenames: false
        args: [--no-header, "-q", "--tb=short", "-x"]
        stages: [pre-push]
      - id: gui-web-tests
        name: GUI web route tests
        entry: uv run pytest tests/unit/test_web_routes.py tests/unit/test_web_routes_step3.py -q
        language: system
        files: ^(src/kicad_mcp/web/|tests/unit/test_web_routes.*\.py)
        pass_filenames: false
      - id: tauri-cargo-check
        name: Tauri cargo check
        entry: cargo check --manifest-path src-tauri/Cargo.toml --locked
        language: system
        files: ^src-tauri/
        pass_filenames: false
