# Golden project corpus for kicad-mcp end-to-end evaluation.
#
# Each project declares its fixture path, expected quality-gate outcomes,
# and key metrics (component count, net count, etc.). The eval harness loads
# this file, runs the defined gates, and scores the results against the
# answer keys.
#
# Answer keys:
#   expected_outcome:      pass | fail — whether the project should pass its
#                           defined quality gate.
#   expected_gates:        Which quality gates are relevant (drc, erc,
#                           placement, manufacturing, project).
#   expected_violations:   Expected violation counts per gate (0 for clean).
#   expected_components:   Number of symbols (schematic) and footprints (PCB).
#   expected_nets:         Number of nets (schematic / PCB).
#   tags:                  Descriptive tags.
#   defect_class:          For fail-case fixtures, what defect class is present.
#   boards:                Per-board definitions (for multi-board projects).
#
# Status values (set by the harness):
#   golden_bom     - golden BOM CSV exists at <fixture_dir>/golden_bom.csv
#   golden_netlist - golden KiCad netlist exists at <fixture_dir>/golden_netlist.net
#   golden_erc     - golden ERC summary JSON exists at <fixture_dir>/golden_erc.json
#   golden_drc     - golden DRC summary JSON exists at <fixture_dir>/golden_drc.json

golden_projects:
  # ── PASS CASES ──────────────────────────────────────────────────────────

  - id: pass_minimal_mcu_board
    dir: tests/fixtures/benchmark_projects/pass_minimal_mcu_board
    kicad_version: ">=9.0"
    expected_outcome: pass
    expected_gates: [erc, drc, placement, project]
    expected_violations:
      erc: 0
      drc: 0
      placement: 0
    expected_components:
      schematic: 2        # R1, R2
      pcb: 3              # J1, U1, C1
    expected_nets:
      schematic: 3        # IN, OUT, GND (implicit)
      pcb: ~
    tags: [pcb, schematic, basic, golden]

  - id: pass_sensor_node
    dir: tests/fixtures/benchmark_projects/pass_sensor_node
    kicad_version: ">=9.0"
    expected_outcome: pass
    expected_gates: [erc, drc, placement, project]
    expected_violations:
      erc: 0
      drc: 0
      placement: 0
    tags: [pcb, schematic, sensors, golden]

  - id: kicad10_custom_drc
    dir: tests/fixtures/benchmark_projects/kicad10_custom_drc
    kicad_version: ">=10.0"
    expected_outcome: pass
    expected_gates: [drc, project]
    expected_violations:
      drc: 0
    tags: [pcb, drc, kicad10, golden]

  - id: kicad10_design_blocks
    dir: tests/fixtures/benchmark_projects/kicad10_design_blocks
    kicad_version: ">=10.0"
    expected_outcome: pass
    expected_gates: [drc, project]
    expected_violations:
      drc: 0
    tags: [pcb, kicad10, design_blocks, golden]

  - id: kicad10_timedomain
    dir: tests/fixtures/benchmark_projects/kicad10_timedomain
    kicad_version: ">=10.0"
    expected_outcome: pass
    expected_gates: [project]
    expected_violations: {}
    tags: [pcb, kicad10, timedomain, golden]

  - id: kicad10_variants
    dir: tests/fixtures/benchmark_projects/kicad10_variants
    kicad_version: ">=10.0"
    expected_outcome: pass
    expected_gates: [drc, erc, project]
    expected_violations:
      drc: 0
      erc: 0
    tags: [pcb, schematic, variants, kicad10, golden]

  # ── FAIL CASES ──────────────────────────────────────────────────────────

  - id: fail_bad_decoupling_placement
    dir: tests/fixtures/benchmark_projects/fail_bad_decoupling_placement
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [placement]
    expected_violations:
      placement: ">=1"
    tags: [pcb, dfm, placement, golden]
    defect_class: dfm_placement

  - id: fail_dfm_edge_clearance
    dir: tests/fixtures/benchmark_projects/fail_dfm_edge_clearance
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [drc, manufacturing]
    expected_violations:
      drc: ">=1"
    tags: [pcb, dfm, clearance, golden]
    defect_class: dfm_clearance

  - id: fail_dirty_transfer_wrong_pad_nets
    dir: tests/fixtures/benchmark_projects/fail_dirty_transfer_wrong_pad_nets
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [drc]
    expected_violations:
      drc: ">=1"
    tags: [pcb, schematic, netlist, golden]
    defect_class: netlist_mismatch

  - id: fail_footprint_overlap_board
    dir: tests/fixtures/benchmark_projects/fail_footprint_overlap_board
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [placement]
    expected_violations:
      placement: ">=1"
    tags: [pcb, placement, golden]
    defect_class: footprint_overlap

  - id: fail_label_only_schematic
    dir: tests/fixtures/benchmark_projects/fail_label_only_schematic
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [erc]
    expected_violations:
      erc: ">=1"
    tags: [schematic, erc, labels, golden]
    defect_class: erc_label_only

  - id: fail_sensor_cluster_spread
    dir: tests/fixtures/benchmark_projects/fail_sensor_cluster_spread
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [placement]
    expected_violations:
      placement: ">=1"
    tags: [pcb, placement, dfm, golden]
    defect_class: dfm_clustering

  - id: fail_sismosmart_like_hierarchy
    dir: tests/fixtures/benchmark_projects/fail_sismosmart_like_hierarchy
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [erc, project]
    expected_violations:
      erc: ">=1"
    tags: [schematic, hierarchy, bom, golden]
    defect_class: multi_sheet_bom

  - id: fail_sismosmart_like_label_only
    dir: tests/fixtures/benchmark_projects/fail_sismosmart_like_label_only
    kicad_version: ">=9.0"
    expected_outcome: fail
    expected_gates: [erc]
    expected_violations:
      erc: ">=1"
    tags: [schematic, erc, hierarchy, golden]
    defect_class: multi_sheet_labels
